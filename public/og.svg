<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Nixon Tse — Growth Marketing and Marketing Analytics">
  <defs>
    <style>
      .bg    { fill: #f2ecdc; }
      .ink   { fill: #1b2b22; }
      .muted { fill: #5f6b62; }
      .line  { stroke: #1b2b22; stroke-opacity: 0.2; stroke-width: 1.5; }
      .serif { font-family: "IBM Plex Serif", "Georgia", serif; }
      .mono  { font-family: "IBM Plex Mono", "Menlo", monospace; }
    </style>
  </defs>

  <!-- Cream paper -->
  <rect class="bg" width="1200" height="630" />

  <!-- Masthead rule -->
  <line class="line" x1="80" y1="96" x2="1120" y2="96" />

  <!-- Top row: tagline -->
  <g class="mono" font-size="16" letter-spacing="4" fill="#5f6b62">
    <text x="80" y="80">PORTFOLIO · UCSB '26 · COMMUNICATION</text>
    <text x="1120" y="80" text-anchor="end">GROWTH · MARKETING ANALYTICS</text>
  </g>

  <!-- Name (two lines, editorial) -->
  <g class="serif ink" font-weight="500">
    <text class="ink" x="80" y="290" font-size="168" letter-spacing="-4">Nixon</text>
    <text class="ink" x="80" y="430" font-size="168" letter-spacing="-4">Tse.</text>
  </g>

  <!-- Right column: standfirst -->
  <g class="serif ink">
    <text x="720" y="270" font-size="26" letter-spacing="-0.2">
      <tspan x="720" dy="0">Turning customer data</tspan>
      <tspan x="720" dy="36">into work people notice —</tspan>
      <tspan x="720" dy="36">growth, analytics, and</tspan>
      <tspan x="720" dy="36">small digital experiments.</tspan>
    </text>
  </g>

  <!-- Bottom rule + meta -->
  <line class="line" x1="80" y1="544" x2="1120" y2="544" />
  <g class="mono" font-size="16" letter-spacing="4" fill="#5f6b62">
    <text x="80" y="576">AVAILABLE · SPRING 2026</text>
    <text x="1120" y="576" text-anchor="end">NIX415.GITHUB.IO</text>
  </g>
</svg>

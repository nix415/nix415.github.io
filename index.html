    />

    <script>
      // Pre-hydrate theme to avoid FOUC on dark mode
      (function () {
        try {
          var t = localStorage.getItem("theme");
          var prefersDark =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (t === "dark" || (!t && prefersDark)) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>

    <div id="root"></div>
